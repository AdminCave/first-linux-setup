# =============================================================================
# AdminCave · first-linux-setup · ADMIN-CONFIG
# -----------------------------------------------------------------------------
# Customize THIS file in a fork. Overrides defaults.conf + profile.
# Anything NOT set here comes from profiles/defaults.conf.
# =============================================================================

# === SSH ===
SSH_KEYS_TARGET_USER="root"
SSH_KEYS_ADD=(
    "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBtqVMLBBmjRfY6HWj3bFBtmBJPjOo5Khrf0Do2uU9Ml kst@kst-pc"
)
SSH_KEYS_REMOVE=(
    # "user@oldhost"
)
SSH_KEYS_KEEP_ONLY=(
    # If set: ALL other keys will be deleted!
)
SSH_HARDEN=true
SSH_PORT=22

# === Packages ===
# Generally useful (also on VMs/containers). btop/dnsutils work
# virtualized too and therefore stay here (not bare-metal-only).
PACKAGES_INSTALL=(
    vim htop btop curl wget git net-tools dnsutils bash-completion screen byobu
    lsb-release gnupg ca-certificates apt-transport-https john jq ncdu
    mtr-tiny needrestart unzip molly-guard iftop parted tree netdiscover
    rsync sshfs wtmpdb fail2ban
)
# Installed only on physical hardware (automatically skipped on VMs/containers).
# Default from profiles/defaults.conf; override here if needed:
# PACKAGES_INSTALL_BAREMETAL=(lshw lm-sensors smartmontools gdisk)
PACKAGES_REMOVE=(
    nano
    check-mk-agent
)

# === Remove files ===
FILES_REMOVE=(
    /etc/motd
)

# === fail2ban ===
FAIL2BAN_ENABLE=true
FAIL2BAN_SSH_MAXRETRY=10
FAIL2BAN_SSH_BANTIME=3600
FAIL2BAN_SSH_FINDTIME=600

# === Timezone / System ===
TIMEZONE="Europe/Berlin"
RUN_UPDATE=true
RUN_UPGRADE=true
INSTALL_FASTFETCH=true
DEPLOY_BASHRC=true
