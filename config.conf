# =============================================================================
# AdminCave · first-linux-setup · ADMIN-CONFIG
# -----------------------------------------------------------------------------
# DIESE Datei im Fork anpassen. Überschreibt defaults.conf + Profil.
# Alles, was hier NICHT gesetzt ist, kommt aus profiles/defaults.conf.
# =============================================================================

# === SSH ===
SSH_KEYS_TARGET_USER="root"
SSH_KEYS_ADD=(
    "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBtqVMLBBmjRfY6HWj3bFBtmBJPjOo5Khrf0Do2uU9Ml kst@kst-pc"
)
SSH_KEYS_REMOVE=(
    # "user@oldhost"
)
SSH_KEYS_KEEP_ONLY=(
    # Wenn gesetzt: ALLE anderen Keys werden geloescht!
)
SSH_HARDEN=true
SSH_PORT=22

# === Pakete ===
# Allgemein sinnvoll (auch auf VMs/Containern). btop/dnsutils funktionieren
# auch virtualisiert und bleiben daher hier (nicht bare-metal-only).
PACKAGES_INSTALL=(
    vim htop btop curl wget git net-tools dnsutils bash-completion screen byobu
    lsb-release gnupg ca-certificates apt-transport-https john jq ncdu
    mtr-tiny needrestart unzip molly-guard iftop parted tree netdiscover
    rsync sshfs wtmpdb fail2ban
)
# Nur auf physischer Hardware installiert (auf VM/Container automatisch übersprungen).
# Default aus profiles/defaults.conf; hier bei Bedarf überschreiben:
# PACKAGES_INSTALL_BAREMETAL=(lshw lm-sensors smartmontools gdisk)
PACKAGES_REMOVE=(
    nano
    check-mk-agent
)

# === Dateien entfernen ===
FILES_REMOVE=(
    /etc/motd
)

# === fail2ban ===
FAIL2BAN_ENABLE=true
FAIL2BAN_SSH_MAXRETRY=10
FAIL2BAN_SSH_BANTIME=3600
FAIL2BAN_SSH_FINDTIME=600

# === Timezone / System ===
TIMEZONE="Europe/Berlin"
RUN_UPDATE=true
RUN_UPGRADE=true
INSTALL_FASTFETCH=true
DEPLOY_BASHRC=true
