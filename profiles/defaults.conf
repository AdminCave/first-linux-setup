# =============================================================================
# AdminCave · first-linux-setup · DEFAULTS
# -----------------------------------------------------------------------------
# Try NOT to change this file in a fork — put your own values in
# config.conf (or an FLS_CONFIG URL). Override order:
#   defaults.conf -> profiles/<profile>.conf -> config.conf -> FLS_CONFIG -> ENV
# MANAGE switches: auto = only intervene when nothing intentional is present,
#                  always = always, never = never.
# =============================================================================

# Note: The active profile is detected at runtime (or forced via --profile /
# FLS_PROFILE) and lives in $FLS_PROFILE — do NOT set it here.

# === System / Updates ===
RUN_UPDATE=true
RUN_UPGRADE=true
TIMEZONE="Europe/Berlin"

# === Locale / Keyboard ===
LOCALE_MANAGE="auto"             # auto|always|never
LOCALE="de_DE.UTF-8"
KEYMAP="de"

# === Time / NTP ===
NTP_MANAGE="auto"                # auto = don't touch if NTP server role/differing config
NTP_BACKEND="timesyncd"          # timesyncd|chrony
NTP_SERVERS=()

# === bashrc (assets/bashrc.template) ===
DEPLOY_BASHRC=true
BASHRC_ALL_USERS=true            # all real login users + /etc/skel + root
BASHRC_BACKUP=true

# === fastfetch (assets/fastfetch.jsonc) ===
INSTALL_FASTFETCH=true

# === Guest agent (only in VMs) ===
GUEST_AGENT_INSTALL="auto"       # auto = by VM type (kvm/qemu -> qemu-guest-agent); true|false

# === Packages ===
PACKAGES_INSTALL=()
# Only useful on physical hardware (no VM/no container) — sensors, SMART,
# hardware info, partitioning. Automatically skipped on VMs/containers.
PACKAGES_INSTALL_BAREMETAL=(lshw lm-sensors smartmontools gdisk)
PACKAGES_REMOVE=()

# === SSH ===
SSH_KEYS_TARGET_USER="root"      # for which user the keys are maintained
SSH_KEYS_ADD=()
SSH_KEYS_REMOVE=()               # patterns
SSH_KEYS_KEEP_ONLY=()            # if set: remove ALL other keys!
SSH_HARDEN=true                  # key login only (failsafe: aborts if no keys present)
SSH_PORT=22

# === Passwords ===
PROMPT_ROOT_PASSWORD=true
# For each present user from this list, prompt whether to change the password:
ADMIN_USERS_PROMPT=(master admin administrator sysadmin sysop linux-admin linuxadmin operator superadmin)

# === fail2ban ===
FAIL2BAN_ENABLE=true
FAIL2BAN_SSH_MAXRETRY=10
FAIL2BAN_SSH_BANTIME=3600
FAIL2BAN_SSH_FINDTIME=600

# === Services / Files / Repos ===
SERVICES_ENABLE=()
FILES_REMOVE=()
FILES_DEPLOY=()                  # "source:target:perms"
APT_REPOS=()                     # "name|deb_line|key_url|format(list|sources)"

# === Proxmox VE / PBS — Repos (deb822 .sources, PVE9/PBS4) ===
PVE_DISABLE_ENTERPRISE=true
PVE_SWITCH_NOSUB_REPO=true
PVE_DISABLE_CEPH_ENTERPRISE=true
PVE_SWITCH_CEPH_NOSUB=true
PVE_REMOVE_SUB_NAG=false         # optional; patches proxmoxlib.js (overwritten on updates)
PBS_DISABLE_ENTERPRISE=true
PBS_SWITCH_NOSUB_REPO=true

# === Proxmox — Tuning ===
SWAPPINESS=10
ZFS_ARC_PROMPT=true              # ask for min/max interactively
ZFS_ARC_MIN=""                   # e.g. "2G" (empty = don't set)
ZFS_ARC_MAX=""                   # e.g. "8G"
