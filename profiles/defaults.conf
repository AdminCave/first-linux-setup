# =============================================================================
# AdminCave · first-linux-setup · DEFAULTS
# -----------------------------------------------------------------------------
# Diese Datei im Fork möglichst NICHT ändern — eigene Werte gehören in
# config.conf (oder eine FLS_CONFIG-URL). Reihenfolge der Überschreibung:
#   defaults.conf -> profiles/<profil>.conf -> config.conf -> FLS_CONFIG -> ENV
# MANAGE-Schalter: auto = nur eingreifen wenn nichts Absichtliches da ist,
#                  always = immer, never = nie.
# =============================================================================

# Hinweis: Das aktive Profil wird zur Laufzeit erkannt (bzw. via --profile /
# FLS_PROFILE erzwungen) und liegt in $FLS_PROFILE — NICHT hier setzen.

# === System / Updates ===
RUN_UPDATE=true
RUN_UPGRADE=true
TIMEZONE="Europe/Berlin"

# === Locale / Tastatur ===
LOCALE_MANAGE="auto"             # auto|always|never
LOCALE="de_DE.UTF-8"
KEYMAP="de"

# === Zeit / NTP ===
NTP_MANAGE="auto"                # auto = nicht anfassen, wenn NTP-Server-Rolle/abweichende Config
NTP_BACKEND="timesyncd"          # timesyncd|chrony
NTP_SERVERS=()

# === bashrc (assets/bashrc.template) ===
DEPLOY_BASHRC=true
BASHRC_ALL_USERS=true            # alle echten Login-User + /etc/skel + root
BASHRC_BACKUP=true

# === fastfetch (assets/fastfetch.jsonc) ===
INSTALL_FASTFETCH=true

# === Gast-Agent (nur in VMs) ===
GUEST_AGENT_INSTALL="auto"       # auto = nach VM-Typ (kvm/qemu -> qemu-guest-agent); true|false

# === Pakete ===
PACKAGES_INSTALL=()
# Nur auf physischer Hardware (keine VM/kein Container) sinnvoll — Sensoren, SMART,
# Hardware-Infos, Partitionierung. Wird auf VMs/Containern automatisch übersprungen.
PACKAGES_INSTALL_BAREMETAL=(lshw lm-sensors smartmontools gdisk)
PACKAGES_REMOVE=()

# === SSH ===
SSH_KEYS_TARGET_USER="root"      # für welchen User die Keys gepflegt werden
SSH_KEYS_ADD=()
SSH_KEYS_REMOVE=()               # Patterns
SSH_KEYS_KEEP_ONLY=()            # falls gesetzt: ALLE anderen Keys entfernen!
SSH_HARDEN=true                  # nur Key-Login (Failsafe: bricht ab, wenn keine Keys da)
SSH_PORT=22

# === Passwörter ===
PROMPT_ROOT_PASSWORD=true
# Pro vorhandenem User aus dieser Liste wird gefragt, ob das Passwort geändert wird:
ADMIN_USERS_PROMPT=(master admin administrator sysadmin sysop linux-admin linuxadmin operator superadmin)

# === fail2ban ===
FAIL2BAN_ENABLE=true
FAIL2BAN_SSH_MAXRETRY=10
FAIL2BAN_SSH_BANTIME=3600
FAIL2BAN_SSH_FINDTIME=600

# === Dienste / Dateien / Repos ===
SERVICES_ENABLE=()
FILES_REMOVE=()
FILES_DEPLOY=()                  # "quelle:ziel:perms"
APT_REPOS=()                     # "name|deb_line|key_url|format(list|sources)"

# === Proxmox VE / PBS — Repos (deb822 .sources, PVE9/PBS4) ===
PVE_DISABLE_ENTERPRISE=true
PVE_SWITCH_NOSUB_REPO=true
PVE_DISABLE_CEPH_ENTERPRISE=true
PVE_SWITCH_CEPH_NOSUB=true
PVE_REMOVE_SUB_NAG=false         # optional; patcht proxmoxlib.js (Update-überschreibbar)
PBS_DISABLE_ENTERPRISE=true
PBS_SWITCH_NOSUB_REPO=true

# === Proxmox — Tuning ===
SWAPPINESS=10
ZFS_ARC_PROMPT=true              # min/max interaktiv erfragen
ZFS_ARC_MIN=""                   # z.B. "2G" (leer = nicht setzen)
ZFS_ARC_MAX=""                   # z.B. "8G"
